name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: MkDocs installieren
        run: |
          pip install mkdocs-material

      - name: GitHub Pages deployen
        run: mkdocs gh-deploy --force
